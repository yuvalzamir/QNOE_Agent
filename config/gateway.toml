  # OpenShell gateway config. Deployed to wherever openshell-gateway 0.0.82
  # actually loads it from (discovered in migration Stage 1 — --config flag or
  # default search path; start_gateway.sh is updated to pass it explicitly if
  # supported). The jwt block predates the 0.0.82 upgrade — reconcile against
  # the new schema in Stage 1.

  [openshell.gateway.gateway_jwt]
  signing_key_path = "/home/qnoe-ai/.local/state/openshell/tls/jwt/signing.pem"
  public_key_path = "/home/qnoe-ai/.local/state/openshell/tls/jwt/public.pem"
  kid_path = "/home/qnoe-ai/.local/state/openshell/tls/jwt/kid"

  # B7-OS: allow user bind mounts on the Docker driver (v0.0.60+ feature; the
  # entire sandbox mount map in config/hermes-sandbox-mounts.json depends on
  # this). Bind mounts default to read_only unless the mount says otherwise.
  [openshell.drivers.docker]
  enable_bind_mounts = true
