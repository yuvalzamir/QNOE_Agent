  version: 1

  filesystem_policy:
    read_only:
      - /opt/qnoe-agent/models
      - /opt/qnoe-agent/config
      - /opt/qnoe-agent/secrets
      - /opt/qnoe-agent/venv
      - /opt/qnoe-agent/agent
      - /ICFO/groups/NOE
      - /ICFO/smbhome/yzamir
    read_write:
      - /opt/qnoe-agent/memory
      - /opt/qnoe-agent/logs
      - /opt/qnoe-agent/skills
      - /ICFO/groups/NOE/ai_agent

  landlock:
    compatibility: best_effort

  process:
    run_as_user: sandbox
    run_as_group: sandbox

  network_policies:
    qdrant:
      name: qdrant-local
      endpoints:
        - host: 172.18.0.1
          port: 6333
          protocol: rest
          enforcement: enforce
          access: read-write
          allowed_ips: ["172.16.0.0/12"]
      binaries:
        - path: /opt/qnoe-agent/venv/bin/python

    github:
      name: github-api
      endpoints:
        - host: api.github.com
          port: 443
          protocol: rest
          enforcement: enforce
          access: read-only
      binaries:
        - path: /opt/qnoe-agent/venv/bin/python
        - path: /usr/bin/git

    github_objects:
      name: github-objects
      endpoints:
        - host: github.com
          port: 443
        - host: objects.githubusercontent.com
          port: 443
      binaries:
        - path: /usr/bin/git

    teams:
      name: microsoft-teams
      endpoints:
        - host: graph.microsoft.com
          port: 443
          protocol: rest
          enforcement: enforce
          access: read-write
      binaries:
        - path: /opt/qnoe-agent/venv/bin/python
